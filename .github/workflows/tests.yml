name: Tests

on:
  push:
    branches: [ main, dev, develop, test ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install ruff
      run: pip install ruff
    - name: Ruff check
      run: ruff check pymaftools/
    - name: Ruff format check
      run: ruff format --check pymaftools/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - python-version: "3.13"
            experimental: true
          - python-version: "3.14"
            experimental: true

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history + tags for setuptools-scm versioning

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libhdf5-dev pkg-config
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test]
    
    - name: Run tests
      run: |
        python -c "import sys; print('Python version:', sys.version)"
        python -c "import pandas as pd; print('Pandas version:', pd.__version__)"
        python -c "import networkx as nx; print('NetworkX version:', nx.__version__)"
        ls -la tests/ || echo "Tests directory not found"
        python -m pytest tests/ -v --tb=short --cov=pymaftools --cov-report=term-missing --cov-fail-under=60
      continue-on-error: ${{ matrix.experimental == true }}

  minimum-pandas:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install minimum supported pandas
      run: |
        python -m pip install --upgrade pip
        pip install -e .[test] "pandas==2.2.*"
    - name: Run tests
      run: python -m pytest tests/ -v --tb=short --cov=pymaftools --cov-fail-under=60
